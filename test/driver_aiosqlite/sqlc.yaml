version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  - schema: schema.sql
    queries: queries.sql
    engine: sqlite
    codegen:
      - out: /attrs/classes
        plugin: python
        options:
          omit_kwargs_limit: 1
          package: test.driver_aiosqlite.attrs.classes
          sql_driver: aiosqlite
          model_type: attrs
          emit_classes: true
          omit_unused_models: true
          emit_init_file: true
          query_parameter_limit: 0
          docstrings: numpy
          speedups: true
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
  - schema: schema.sql
    queries: queries.sql
    engine: sqlite
    codegen:
      - out: /attrs/functions
        plugin: python
        options:
          package: test.driver_aiosqlite.attrs.functions
          sql_driver: aiosqlite
          model_type: attrs
          emit_classes: false
          omit_unused_models: true
          emit_init_file: true
          query_parameter_limit: 0
          docstrings: numpy
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
  - schema: schema.sql
    queries: queries.sql
