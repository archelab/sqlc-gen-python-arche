version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  # MAJOR-1 escape proof: the body rewrite escapes EVERY colon (cast AND a
  # non-cast literal colon in 'a:b'), then rewrites $N -> :pN. The golden pins
  # `count(*)\\:\\:bigint`, `'a\\:b'`, `= :p1\\:\\:bigint`, and the header
  # `\\:one`.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.sql_escape.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
