version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  # Proves the singularize_result_columns:false knob: the plural result-column
  # aliases (total_creditos / total_documentos / valor_servicos / codigo_barras)
  # emit VERBATIM, not singularized. This is the drop-in-from-upstream behaviour
  # arche relies on so its ~470 codegen consumers compile unchanged after the
  # swap off upstream sqlc-gen-python. The default (true) is golden-pinned by
  # every other case (which omit the knob); base-table model fields are always
  # verbatim regardless of the knob.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.verbatim_result_columns.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          singularize_result_columns: false
