version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # P-22 sqlc.embed parity: the embedded `author` table composes a nested
  # models.Author sub-struct field on the GetBookWithAuthor Row (inherited
  # better-python behaviour; pinned here for the sqlalchemy/pydantic driver, and
  # exercising the builders.go:385-391 embed branch that the F2 nullability seam
  # leaves out of scope).
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.embed.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
