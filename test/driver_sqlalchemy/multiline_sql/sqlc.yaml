version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # P-17: multi-line SQL (and an embedded multi-line block comment) is emitted
  # verbatim into the `typing.Final[str]` query constant without breaking the
  # triple-quoted string; the F1 colon-escape + `$N`->`:pN` rewrite apply across
  # every line.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.multiline_sql.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
