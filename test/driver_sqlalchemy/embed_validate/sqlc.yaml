version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  # A sqlc.embed of `author` whose jsonb `settings` column is overridden to a
  # typed pydantic shape with validate: true — the validated column lives INSIDE
  # the embed, so the adapter-declaration set must recurse into embed fields.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.embed_validate.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          overrides:
            - column: author.settings
              py_type:
                import: test.driver_sqlalchemy.embed_validate.shapes
                package: AuthorSettings
                type: AuthorSettings
              validate: true
