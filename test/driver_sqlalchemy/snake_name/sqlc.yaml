version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: ae82dcd410956538f871680a271dd9c1f4def9365fe47232df2b227c6fafccb6
sql:
  # Pins the query-constant header MethodName byte-exactness (minor-1): a
  # snake_case query name (`get_thing_by_id`) emits the constant
  # GET_THING_BY_ID and the header `-- name: get_thing_by_id \:one` with the
  # MethodName VERBATIM (snake_case), matching the reference convention
  # (file_attachment.py). The PascalCase verb cases never exercise this.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.snake_name.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
