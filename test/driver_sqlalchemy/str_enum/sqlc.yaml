version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  # Proves P-11 (C-#16): the order_status PG ENUM emits
  # `class OrderStatus(enum.StrEnum):` into models.py with double-quoted values
  # and clean uppercased member names (PENDING / SHIPPED / OUT_FOR_DELIVERY /
  # DELIVERED). models.py imports stdlib `enum`; the enum-typed column is the
  # bare `OrderStatus` inside models.py and `models.OrderStatus` in the query
  # file. Insurance — a typical consumer has zero PG ENUM columns.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.str_enum.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
