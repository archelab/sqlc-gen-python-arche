version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: b25ac08c9e82bdf3cc0f24d12a10a0ff6af405919005d863c8d11ed4ecfbc64d
sql:
  # P-18 defaults-last ordering regression: a pydantic Row mixing NOT NULL and
  # nullable columns keeps SELECT/column order with NO `= None` field default
  # (the reference pydantic models carry zero defaults).
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.defaults_last.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
