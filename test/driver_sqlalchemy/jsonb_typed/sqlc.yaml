version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # P-09 jsonb policy: the un-overridden `payload` jsonb column defaults to
  # typing.Any (matching the reference models.py Optional[Any]); the `config` jsonb
  # column is mapped to a typed pydantic model (shapes.WidgetConfig) by a
  # per-column override, proving a known JSON shape can be typed without
  # changing the default.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.jsonb_typed.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          overrides:
            - column: widget.config
              py_type:
                import: test.driver_sqlalchemy.jsonb_typed.shapes
                package: WidgetConfig
                type: WidgetConfig
