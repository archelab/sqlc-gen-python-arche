version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: 9c5216ad925cce4b57ec9c48a1bb2c9c435898e30bef98ac56d03530c5ada79e
sql:
  # Pins the v0.5.2 drop-in-from-upstream fixes (B duplicate-column de-collision,
  # C emit_list_arrays list[T], E FOR-UPDATE :many streams). Uses the same option
  # set arche pins so the golden mirrors arche's emitted shape.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.dropin_fixes.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          singularize_result_columns: false
          emit_list_arrays: true
