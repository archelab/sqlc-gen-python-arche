version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # Proves the SQLAlchemy verb method shapes (:one scalar + struct, :exec,
  # :execrows) and the F6 AsyncQuerier class template, modelled on the reference
  # file_attachment.py. The query constants carry the fully-escaped
  # body (`$N`->`:pN`, `::`->`\:\:`) and header verb (`\:one`) from the F1
  # rewrite hook. Param shapes (default qpl=4): 1-param queries are flat
  # keyword-only `(self, *, name)` with a `{"pN": name}` named-bind dict;
  # insert_file_attachment (6 params > 4) bundles into
  # InsertFileAttachmentParams passed positionally as `arg`, body reads
  # arg.field — byte-matching file_attachment.py.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.verbs.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
