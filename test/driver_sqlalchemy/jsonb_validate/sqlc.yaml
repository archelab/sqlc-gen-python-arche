version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: 9c5216ad925cce4b57ec9c48a1bb2c9c435898e30bef98ac56d03530c5ada79e
sql:
  # Two jsonb columns overridden to typed pydantic shapes with `validate: true`,
  # so the generated read path emits
  # `pydantic.TypeAdapter(<type>).validate_python(row[0])` (fail-loud) instead of
  # returning the decoded value unwrapped. `config` is a nested model; `payload`
  # is a discriminated union A | B | C[D] (incl. a generic member).
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.jsonb_validate.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          overrides:
            - column: widget.config
              py_type:
                import: test.driver_sqlalchemy.jsonb_validate.shapes
                package: WidgetConfig
                type: WidgetConfig
              validate: true
            - column: widget.payload
              py_type:
                import: test.driver_sqlalchemy.jsonb_validate.shapes
                package: WidgetPayload
                type: WidgetPayload
              validate: true
            - column: widget.extra
              py_type:
                import: test.driver_sqlalchemy.jsonb_validate.shapes
                package: WidgetConfig
                type: WidgetConfig
              validate: true
