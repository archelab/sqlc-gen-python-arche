version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # P-19 omit_unused_models: an unreferenced table model is dropped from
  # models.py (inherited config; pinned here for the sqlalchemy/pydantic driver).
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.omit_unused.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          omit_unused_models: true
