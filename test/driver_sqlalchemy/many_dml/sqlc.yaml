version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: ae82dcd410956538f871680a271dd9c1f4def9365fe47232df2b227c6fafccb6
sql:
  # Proves P-03 (C-#13): a :many whose SQL root is a DML statement
  # (UPDATE/DELETE/INSERT ... RETURNING) emits
  # `result = await self._conn.execute(...); return [Row(..) for row in
  # result.all()]` returning list[Row] — NOT conn.stream (Postgres rejects a
  # server-side cursor for DML+RETURNING). Covers a struct-returning UPDATE, a
  # scalar-returning DELETE, and a struct-returning INSERT. Synthetic — a typical consumer
  # has zero such queries today.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.many_dml.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
