version: "2"
plugins:
  - name: python
    wasm:
      url: file://../sqlc-gen-python-arche.wasm
      sha256: dfae30c300e60390c91c4788920c00158be5ec45f4d6c13c9bf73d1ba9e432df
sql:
  # Pins the C-#15 keyword-only-vs-bundle boundary at query_parameter_limit: 2:
  #   - 1 param (below)  -> `(self, *, a)` keyword-only
  #   - 2 params (== qpl) -> `(self, *, a, b)` keyword-only (NOT bundled)
  #   - 3 params (above) -> `(self, arg: <Method>Params)` positional bundle,
  #     body reads arg.field
  # plus the P-16 flat-arg de-collision (two `status` -> status / status_2) and
  # the placeholder-number-keyed bind dict.
  - schema: schema.sql
    queries: queries.sql
    engine: postgresql
    codegen:
      - out: gen
        plugin: python
        options:
          package: test.driver_sqlalchemy.params_boundary.gen
          sql_driver: sqlalchemy
          model_type: pydantic
          emit_classes: true
          emit_init_file: false
          query_parameter_limit: 2
