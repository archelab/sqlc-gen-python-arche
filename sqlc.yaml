version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-python-arche.wasm
      sha256: 9c5216ad925cce4b57ec9c48a1bb2c9c435898e30bef98ac56d03530c5ada79e
sql:
  - schema: test/schema.sql
    queries: test/queries.sql
    engine: postgresql
    codegen:
      - out: test
        plugin: python
        options:
          package: test
          sql_driver: asyncpg
          model_type: msgspec
          emit_classes: true
          omit_unused_models: false
          emit_init_file: false
          query_parameter_limit: 0
          debug: true
          docstrings: numpy
          overrides:
            - db_type: serial
              py_type:
                import: test
                package: test_type
                type: test_type.Test
            - column: test_inner_postgres_types.bool_test
              py_type:
                import: test
                package: test_type
                type: test_type.Test

