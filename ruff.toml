# Lint target is intentionally one minor below the 3.11 runtime floor: it keeps
# ruff from rewriting the generated trees to 3.11-only idioms (e.g. UP017
# datetime.UTC) that the codegen does not emit. `datetime.timezone.utc` etc. are
# valid on every supported version.
target-version = "py310"
line-length = 120

[lint]
preview = true
# https://docs.astral.sh/ruff/rules/
select = ["ALL"]
ignore = [
    "COM812",  # Missing trailing comma (interferes with the formatter)
]


[lint.per-file-ignores]
"test/**" = [
    "E501",    # Line too long
    "PLR0913",  # Too many arguments in function definition
    #"D", # Docstrings
    "S101", # Use of assert detected
    "PLR0915", # Too many statements
    "S311", # Standard pseudo-random generators are not suitable for cryptographic purposes
    "PLR0904", # Too many public methods
]
"test/**/*test*.py" = [
    "D", # ignore docstrings in test files
    "DTZ005", # `datetime.datetime.now()` called without a `tz` argument
    "DTZ011", # `datetime.date.today()` used
    "DTZ001", # `datetime.datetime()` called without a `tzinfo` argument
    "PLR6301" # method does not use `self`
]
# Empty package markers under the test tree (needed so pytest can import the
# generated `<case>.gen` modules at runtime). They carry no code, so the
# docstring/copyright/namespace rules do not apply.
"test/**/__init__.py" = [
    "D104", # Missing docstring in public package
    "CPY001", # Missing copyright notice at top of file
]
# The live-PG fixture conftest reads one small schema.sql at setup and yields the
# connection inside its `async with` resource block. These are deliberate, correct
# test-harness patterns, not the production-async hazards the preview rules target:
# the project is asyncio (not trio/anyio), the file read is a one-time fixture
# setup, and the consuming fixtures guarantee teardown with an explicit
# `gen.aclose()` (see their bodies), so the context manager DOES run cleanup.
"test/driver_sqlalchemy/conftest.py" = [
    "ASYNC240", # blocking pathlib read in an async fn — fine for a one-shot fixture
    "ASYNC119", # yield inside `async with` in an async generator — teardown is
                # guaranteed by the fixtures' explicit `gen.aclose()`
]
"noxfile.py" = [
    "D"
]
"scripts/**" = [
    "T201", # Print found
    "INP001", # File is part of an implicit namespace package. Add an `__init__.py`.
]
# Purely generated code
"**/{classes,functions}/*.py" = [
    "CPY001", # Missing copyright notice at top of file
    "I001", # Import block is un-sorted or un-formatted
    "FBT001", # Boolean-typed positional argument in function definition
    "ANN401", # `typing.Any` params: json/jsonb default to Any (P-09), matching
              # the reference models.py Optional[Any]; Any in generated code is intended.
]
"**/{msgspec}/{classes,functions}/*.py" = [
    "DOC501", # Raised exception `StopIteration` missing from docstring
    # Ruff doesn't understand that we actually documented the exceptions raised when using pep257
]
# Purely generated SQLAlchemy-driver code (test/driver_sqlalchemy/<case>/gen/).
# These rules are codegen-cosmetic for reference-faithful output — which carries
# no docstrings, no copyright, no __init__.py, and raw `id` params — NOT
# correctness. The F-rules (F401 unused/undefined), pyright strict, and the
# bug-catching checks stay ACTIVE (they caught the missing `import pydantic` and
# the alias type error); only the cosmetic noise the generated bytes intentionally
# omit is suppressed here.
"test/driver_sqlalchemy/*/gen/*.py" = [
    "CPY001", # Missing copyright notice (this codegen has none)
    "I001", # Import block order is codegen-controlled
    "I002", # Required `from __future__ import annotations` — pydantic suppresses it
            # (it resolves annotations at RUNTIME to build each model's validator;
            # future-annotations makes them lazy strings → PydanticUserError). the reference
            # committed codegen carries no future-annotations either.
    "INP001", # Implicit namespace package (emit_init_file:false, app_db parity)
    "D100", # Missing module docstring
    "D101", # Missing class docstring
    "D102", # Missing method docstring (the generator emits no method docstrings)
    "D104", # Missing package docstring
    "D204", # 1 blank line after class docstring
    "D406", # Section name should end with a newline
    "D407", # Missing dashed underline after section
    "ANN204", # Missing return type for __init__ (no `-> None`)
    "ANN401", # `typing.Any` params/fields: json/jsonb default to Any (P-09),
              # matching the reference models.py Optional[Any]. Any in codegen is intended.
    "TC003", # Move stdlib import into type-checking block (codegen placement)
    "A002", # Argument `id` shadows a builtin (the generator keeps raw `id` params)
]
# Hand-written typed-JSON shape fixtures imported BY the generated jsonb_typed
# code (e.g. test/driver_sqlalchemy/jsonb_typed/shapes.py). They are pydantic
# RootModels resolved at runtime, so `from __future__ import annotations` is
# unsafe (lazy string annotations -> PydanticUserError, same reason the gen
# trees suppress I002), they need no copyright header, and they intentionally
# sit in an implicit namespace package alongside the case's gen/ tree.
"test/driver_sqlalchemy/*/shapes.py" = [
    "I002", # future-annotations unsafe for runtime-resolved pydantic models
    "CPY001", # hand-written fixture, no copyright header
    "INP001", # implicit namespace package (parity with the case gen/ tree)
    "TC003", # stdlib types (datetime/decimal) used as pydantic FIELD annotations
             # must stay runtime imports — pydantic resolves the annotations at
             # model-build time, so moving them into a type-checking block raises
             # at runtime. Same rationale as the gen-tree suppression above.
]
# Purely generated code in the vendored reference-shape deletion-proof repro
# (test/shape_repro/gen/). Same codegen-cosmetic suppressions as the
# driver_sqlalchemy gen trees — this is a consolidated config (file_header
# `# pyright: basic`, emit_init_file:true), so it carries the same no-docstring/
# no-copyright/Any-by-default shape the reference bytes intend. Bug-catching rules
# (F-rules, undefined-name) stay ACTIVE.
"test/shape_repro/gen/*.py" = [
    "CPY001", # Missing copyright notice (this codegen has none)
    "I001", # Import block order is codegen-controlled
    "I002", # future-annotations suppressed (pydantic resolves at runtime)
    "INP001", # gen/__init__.py is nested under the implicit-namespace case dir
    "D100", # Missing module docstring (analytics header `# pyright: basic` is line 1)
    "D101", # Missing class docstring
    "D102", # Missing method docstring (the generator emits no method docstrings)
    "D104", # Missing package docstring (__init__.py is header-only)
    "ANN204", # Missing return type for __init__ (no `-> None`)
    "ANN401", # `typing.Any` fields: jsonb defaults to Any (P-09), intended.
    "TC003", # Move stdlib import into type-checking block (codegen placement)
]


[lint.isort]
required-imports = ["from __future__ import annotations"]
force-single-line = true

[lint.pydocstyle]
convention = "numpy"

[format]
exclude = [
    "models.py",
    "queries.py",
]