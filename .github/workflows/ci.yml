name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

  test:
    name: "Run tests via nox"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432/tcp              # host‑port is picked automatically
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: ${{ matrix.python-version }}
          prune-cache: true

      - name: Run tests via nox
        env:
          # GitHub tells you which host‑port was assigned via the `job.services` context
          POSTGRES_URI: postgres://postgres:postgres@localhost:${{ job.services.postgres.ports['5432'] }}/testdb
        run: |
          uv run nox -s pytest -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: .coverage.${{ matrix.python-version }}
          path: .coverage
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  # upload-coverage taken from: https://github.com/hikari-py/hikari/blob/master/.github/workflows/ci.yml#L66
  #
  # Copyright (c) 2020 Nekokatt
  # Copyright (c) 2021-present davfsa
  #
  # Permission is hereby granted, free of charge, to any person obtaining a copy
  # of this software and associated documentation files (the "Software"), to deal
  # in the Software without restriction, including without limitation the rights
  # to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
  # copies of the Software, and to permit persons to whom the Software is
  # furnished to do so, subject to the following conditions:
  #
  # The above copyright notice and this permission notice shall be included in all
  # copies or substantial portions of the Software.
  upload-coverage:
    needs: [ test ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"
          activate-environment: true

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          path: coverages/

      - name: Extract individual coverage files
        run: |
          cd coverages
          
          for coverage_dir in ./.coverage.*; do
              mv "$coverage_dir/.coverage" "../$coverage_dir"
              rmdir "$coverage_dir"
          done
          
          cd ..

      - name: Combine coverage
        run: |
          uv sync --frozen --only-group coverage

          coverage combine
          coverage xml
          coverage report


  ruff:
    runs-on: ubuntu-latest
    name: "Run ruff via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      - name: Run ruff via nox
        run: |
          uv run nox -s ruff_check -- --output-format=github
  pyright:
    runs-on: ubuntu-latest
    name: "Run pyright via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"
      - name: Run pyright via nox
        run: |
          uv run nox -s pyright
  asyncpg:
    runs-on: ubuntu-latest
    name: "Run asyncpg check via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      # The nox check sessions build the wasm fresh from source first (it is
      # gitignored, never committed), so Go is required. Pinned to the go.mod
      # toolchain; GOTOOLCHAIN in build.sh makes the wasm sha reproducible.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: Run sqlc verify via nox
        run: |
          uv run nox -s asyncpg_check

  aiosqlite:
    runs-on: ubuntu-latest
    name: "Run aiosqlite check via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      # nox builds the wasm fresh from source (gitignored) → Go required.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: Run sqlc verify via nox
        run: |
          uv run nox -s aiosqlite_check

  sqlite3:
    runs-on: ubuntu-latest
    name: "Run sqlite3 check via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      # nox builds the wasm fresh from source (gitignored) → Go required.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: Run sqlc verify via nox
        run: |
          uv run nox -s sqlite3_check

  # SQLAlchemy/pydantic golden check (sqlc diff + pyright + ruff over every
  # per-case gen tree). Pinned at sqlc v1.31.1 — the engine the consuming project
  # generates with (P-20) — so the committed `# sqlc v1.31.1` golden headers match.
  sqlalchemy:
    runs-on: ubuntu-latest
    name: "Run sqlalchemy check via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      # nox builds the wasm fresh from source (gitignored) → Go required.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: Run sqlc verify via nox
        run: |
          uv run nox -s sqlalchemy_check

  # GOAL §6 STEP-B fork-side post-processor-deletion proof: regenerate the
  # vendored reference-shape repro (test/shape_repro/) through the fork wasm with
  # ZERO post-processing and assert byte-empty (sqlc diff) vs the committed
  # migration baseline. Engine-pinned at v1.31.1 (P-20).
  deletion-proof:
    runs-on: ubuntu-latest
    name: "Run post-processor-deletion proof via nox"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.6.9"
          python-version: "3.13"

      # nox builds the wasm fresh from source (gitignored) → Go required.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: Run deletion proof via nox
        run: |
          uv run nox -s deletion_proof

  # Go unit + architecture tests (config/enums/nullability/validate + the
  # SQLAlchemy F3/F6/params arch tests). These pin the generator invariants the
  # goldens prove at the byte level; running them in CI guards against a Go-side
  # regression that a stale golden could otherwise mask.
  go-test:
    runs-on: ubuntu-latest
    name: "Run Go tests"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Run go vet
        run: go vet ./...

      - name: Run go test
        run: go test ./...

  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Make build script executable
        run: chmod +x scripts/build/build.sh

      - name: Run build.sh
        run: ./scripts/build/build.sh

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifact
          path: sqlc-gen-python-arche.wasm
          if-no-files-found: error
          retention-days: 30

  # wasm-pins: prove the committed sqlc.yaml sha256 pins are a reproducible
  # function of the CURRENT Go source. The wasm itself is gitignored (never
  # committed), so the only thing tracking it is the sha256 in each sqlc.yaml.
  # build.sh pins GOTOOLCHAIN=go1.24.1 so the sha is byte-stable across machines;
  # this job rebuilds from source and `git diff --exit-code`s the sqlc.yaml files
  # — a non-empty diff means the committed pins no longer match a fresh source
  # build (someone changed plugin/ or internal/ without re-running build.sh), and
  # the job fails. This is the construction-time guarantee that no golden job can
  # ever validate against a wasm older than the source.
  wasm-pins:
    runs-on: ubuntu-latest
    name: "Prove sqlc.yaml sha pins match a fresh source build"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Rebuild wasm from source and re-pin sqlc.yaml shas
        run: ./scripts/build/build.sh

      - name: Assert committed sqlc.yaml pins match the source build
        run: git diff --exit-code -- '**/sqlc.yaml' sqlc.yaml

  ci-done:
    needs: [ test, upload-coverage, asyncpg, aiosqlite, sqlite3, sqlalchemy, deletion-proof, go-test, pyright, ruff, test-build, wasm-pins ]
    if: always() && !cancelled()

    runs-on: ubuntu-latest

    steps:
      - name: Set status based on required jobs
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              exit 1
            fi
          done
